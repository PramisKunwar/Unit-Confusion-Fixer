<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unit Confusion Fixer</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <div class="popup-header">
      <span class="popup-icon">⚗</span>
      <h1>Unit Confusion Fixer</h1>
    </div>
    <div class="popup-divider"></div>
    <div class="popup-body">
      <p class="popup-desc">Detects physical quantities on webpages and shows SI conversions.</p>
      <div class="toggle-row">
        <span class="toggle-label" id="statusLabel">ENABLED</span>
        <button class="toggle-btn" id="toggleBtn" title="Toggle extension">ON</button>
      </div>
    </div>
    <div class="popup-footer">
      <span>v1.0 — Physics Grade 11/12</span>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
